<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dinesh Surrya | Todo Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&display=swap" rel="stylesheet">
    <style>
        /* Embedding core styles for the landing page */
        html,
        body {
            height: 100vh;
            width: 100vw;
            margin: 0;
            padding: 0;
            font-family: 'Orbitron', sans-serif;
            color: #fff;
            overflow: hidden;
            background: #000;
        }

        #bg-video {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -2;
        }

        .vh-100 {
            position: relative;
            z-index: 10;
            padding-bottom: 80px;
        }

        .card {
            background: rgba(0, 0, 0, 0.7) !important;
            border: 2px solid rgba(0, 255, 247, 0.6);
            border-radius: 15px;
            backdrop-filter: blur(12px) saturate(180%);
            -webkit-backdrop-filter: blur(12px) saturate(180%);
            box-shadow: 0 0 30px rgba(0, 0, 0, 0.5), 0 0 15px rgba(0, 255, 247, 0.2);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 0 50px rgba(0, 255, 247, 0.4);
            border-color: #00fff7;
        }

        .zoom-box:hover {
            transform: translateY(-8px) scale(1.03) !important;
        }

        .todo-heading {
            font-size: 3rem;
            font-weight: 800;
            color: #00fff7;
            text-transform: uppercase;
            letter-spacing: 5px;
            text-shadow: 0 0 10px #00fff7, 0 0 20px #00fff7;
        }

        .btn-visit {
            background: #00fff7 !important;
            color: #000 !important;
            font-weight: 900;
            border: none;
            box-shadow: 0 0 15px #00fff7;
            transition: 0.3s;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 50px;
            text-transform: uppercase;
            letter-spacing: 2px;
            display: inline-block;
            margin-top: 20px;
        }

        .btn-visit:hover {
            background: #fff !important;
            box-shadow: 0 0 25px #fff;
            transform: scale(1.05);
        }

        /* Footer Styles */
        .footer-contact {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            padding: 15px 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border-top: 2px solid rgba(0, 255, 247, 0.4);
            z-index: 1000;
        }

        .contact-links {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 8px;
        }

        .contact-icon {
            font-size: 1.6rem;
            color: #00fff7;
            text-shadow: 0 0 10px rgba(0, 255, 247, 0.5);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            text-decoration: none;
        }

        .contact-icon:hover {
            color: #fff;
            transform: translateY(-5px);
        }

        .contact-icon.github:hover {
            color: #fff;
            text-shadow: 0 0 20px #fff, 0 0 30px #00fff7;
        }

        .contact-icon.linkedin:hover {
            color: #0077b5;
            text-shadow: 0 0 20px #0077b5, 0 0 30px #0077b5;
        }

        .contact-icon.email:hover {
            color: #ff00c8;
            text-shadow: 0 0 20px #ff00c8, 0 0 30px #ff00c8;
        }

        .copyright {
            font-size: 0.65rem;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255, 255, 255, 0.4);
            margin: 0;
            font-weight: 500;
        }
    </style>
</head>

<body>
    <video autoplay muted loop playsinline id="bg-video">
        <source src="./todos/static/todos/videos/Cyber_Punk.mp4" type="video/mp4">
        Your browser does not support the video tag.
    </video>

    <div class="d-flex justify-content-center align-items-center vh-100 text-center">
        <div class="card zoom-box p-5 mx-3" style="max-width: 550px;">
            <h1 class="todo-heading mb-4">
                <i class="fas fa-check-double"></i> Cyber Todo
            </h1>
            <p class="lead mb-4" style="color: rgba(255, 255, 255, 0.8); letter-spacing: 1px;">
                Experience the ultimate task management system with a futuristic cyberpunk aesthetic.
            </p>
            <div class="features mb-4 text-start" style="color: #00fff7; font-size: 0.9rem;">
                <div class="mb-2"><i class="fas fa-bolt me-2"></i> Real-time Task Updates</div>
                <div class="mb-2"><i class="fas fa-history me-2"></i> Completed Task History</div>
                <div class="mb-2"><i class="fas fa-glass-water me-2"></i> Glassmorphism UI</div>
            </div>
            <a href="https://github.com/DINESHSURRYA/TodoProject" target="_blank" class="btn btn-visit">
                <i class="fab fa-github me-2"></i> View Project Source
            </a>
        </div>
    </div>

    <footer class="footer-contact">
        <div class="container text-center">
            <div class="contact-links">
                <a href="https://github.com/DINESHSURRYA" target="_blank" class="contact-icon github"
                    data-bs-toggle="tooltip" title="GitHub">
                    <i class="fab fa-github"></i>
                </a>
                <a href="https://www.linkedin.com/in/dinesh-surrya-a5a67a2ba" target="_blank"
                    class="contact-icon linkedin" data-bs-toggle="tooltip" title="LinkedIn">
                    <i class="fab fa-linkedin"></i>
                </a>
                <a href="mailto:dineshsurrya66@gmail.com" class="contact-icon email" data-bs-toggle="tooltip"
                    title="Email">
                    <i class="fas fa-envelope"></i>
                </a>
            </div>
            <p class="copyright">&copy; 2024 DINESH SURRYA. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const tooltipTriggerList = document.querySelectorAll('[data-bs-toggle="tooltip"]')
        const tooltipList = [...tooltipTriggerList].map(tooltipTriggerEl => new bootstrap.Tooltip(tooltipTriggerEl))
    </script>
</body>

</html>
